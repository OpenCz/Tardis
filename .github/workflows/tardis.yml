name: CI

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - "no-ga/**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches-ignore:
      - "no-ga/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIRROR_SSH_URL: ${{ vars.MIRROR_SSH_URL || secrets.MIRROR_SSH_URL }}

jobs:
  check_mirror:
    environment: production
    runs-on: ubuntu-latest

    outputs:
      is_mirror: ${{ steps.check.outputs.is_mirror }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [ -z "$MIRROR_SSH_URL" ]; then
            echo "::warning::MIRROR_SSH_URL is empty, mirror detection disabled for this run"
            echo "is_mirror=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          ORIGIN=$(git remote get-url origin)
          ORIGIN=$(echo $ORIGIN | sed 's|https://github.com|git@github.com:|; s|$|.git|')
          ORIGIN=$(echo $ORIGIN | sed 's/com:\//com:/')

          echo "is_mirror=$( [ "$ORIGIN" = "$MIRROR_SSH_URL" ] && echo true || echo false )" >> $GITHUB_OUTPUT

  check_python_coding_style:
    needs: check_mirror
    if:
      needs.check_mirror.outputs.is_mirror == 'false'
    environment: production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install --upgrade pip ruff

      - name: Ruff Format Check
        run: ruff format --check . --exclude notebooks
        
  run_tests:
    environment: production
    runs-on: ubuntu-latest
    needs:
      - check_mirror
      - check_python_coding_style
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Python syntax
        run: python -m compileall -q .
        timeout-minutes: 2
  
  open_pull_request:
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    needs:
      - check_mirror
      - run_tests
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get body content
        id: pr_body
        run: |
          echo "COMMITS_LIST<<EOF" >> $GITHUB_ENV
          echo "### List of changements: " >> $GITHUB_ENV
          git log origin/main..HEAD --oneline --pretty=format:"- %s (%h)" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create PR dev -> main
        run: |
          gh pr create \
            --title "merge: ${{ github.ref_name }} -> main" \
            --body "$COMMITS_LIST" \
            --reviewer "lukas-sgx,copilot" \
            --base main \
            --head dev || echo "PR already exists or could not be created"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  
  push_to_mirror:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      - check_mirror
      - run_tests
    environment: production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate mirror URL
        run: |
          if [ -z "$MIRROR_SSH_URL" ]; then
            echo "::error::MIRROR_SSH_URL is empty. Define vars.MIRROR_SSH_URL or secrets.MIRROR_SSH_URL."
            exit 1
          fi

      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.PRIVATE_SSH_KEY }}
          ssh_username: git
