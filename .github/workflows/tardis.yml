name: CI

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - "no-ga/**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches-ignore:
      - "no-ga/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIRROR_SSH_URL: "git@github.com:EpitechPGE1-2025/G-AIA-210-NCE-2-1-tardis-1.git"

jobs:
  check_mirror:
    environment: production
    runs-on: ubuntu-latest

    outputs:
      is_mirror: ${{ steps.check.outputs.is_mirror }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [ -z "$MIRROR_SSH_URL" ]; then
            echo "::warning::MIRROR_SSH_URL is empty, mirror detection disabled for this run"
            echo "is_mirror=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          ORIGIN=$(git remote get-url origin)
          ORIGIN=$(echo $ORIGIN | sed 's|https://github.com|git@github.com:|; s|$|.git|')
          ORIGIN=$(echo $ORIGIN | sed 's/com:\//com:/')

          echo "is_mirror=$( [ "$ORIGIN" = "$MIRROR_SSH_URL" ] && echo true || echo false )" >> $GITHUB_OUTPUT

  check_python_coding_style:
    needs: check_mirror
    if:
      needs.check_mirror.outputs.is_mirror == 'false'
    environment: production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install --upgrade pip ruff

      - name: Ruff Format Check
        run: ruff format --check . --exclude notebooks
        
  run_tests:
    environment: production
    runs-on: ubuntu-latest
    needs:
      - check_mirror
      - check_python_coding_style
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Python syntax
        run: python -m compileall -q .
        timeout-minutes: 2
  
  open_pull_request:
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    needs:
      - check_mirror
      - run_tests
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get body content
        id: pr_body
        run: |
          echo "COMMITS_LIST<<EOF" >> $GITHUB_ENV
          echo "### List of changements: " >> $GITHUB_ENV
          git log origin/main..HEAD --oneline --pretty=format:"- %s (%h)" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create PR dev -> main
        run: |
          gh pr create \
            --title "merge: ${{ github.ref_name }} -> main" \
            --body "$COMMITS_LIST" \
            --reviewer "lukas-sgx,copilot" \
            --base main \
            --head dev || echo "PR already exists or could not be created"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  
  push_to_mirror:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      - check_mirror
      - run_tests
    environment: tardis_production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate mirror URL
        run: |
          if [ -z "$MIRROR_SSH_URL" ]; then
            echo "::error::MIRROR_SSH_URL is empty. Define vars.MIRROR_SSH_URL or secrets.MIRROR_SSH_URL."
            exit 1
          fi

      - name: Configure SSH key
        env:
          PRIVATE_SSH_KEY: ${{ secrets.PRIVATE_SSH_KEY }}
        run: |
          if [ -z "$PRIVATE_SSH_KEY" ]; then
            echo "::error::PRIVATE_SSH_KEY is empty. Define secrets.PRIVATE_SSH_KEY in the tardis_production environment."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Handle keys stored either with real newlines or with literal \n sequences.
          printf '%s' "$PRIVATE_SSH_KEY" | perl -pe 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/id_rsa
          echo >> ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Push mirror
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes
        run: |
          git checkout --detach
          git fetch --prune --tags origin '+refs/heads/*:refs/heads/*'
          git remote remove mirror 2>/dev/null || true
          git remote add mirror "$MIRROR_SSH_URL"

          git ls-remote mirror >/dev/null
          git push --mirror mirror
