name: Tardis CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint_and_sanity:
    name: Lint and Sanity Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -s requirements.txt ]]; then
            python -m pip install -r requirements.txt
          else
            echo "requirements.txt is empty, skipping dependency installation."
          fi

      - name: Validate Python syntax
        shell: bash
        run: |
          set -euo pipefail
          if find dashboard -name "*.py" -print -quit | grep -q .; then
            python -m compileall -q dashboard
            echo "Python syntax validation passed."
          else
            echo "No Python files found under dashboard/."
          fi

      - name: Validate notebook JSON format
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import pathlib
          import sys

          failed = []
          notebook_dir = pathlib.Path("notebooks")
          if not notebook_dir.exists():
              print("notebooks/ directory not found, skipping notebook validation.")
              sys.exit(0)

          for notebook in notebook_dir.glob("*.ipynb"):
              try:
                  json.loads(notebook.read_text(encoding="utf-8"))
              except Exception as exc:
                  failed.append((str(notebook), str(exc)))

          if failed:
              for path, reason in failed:
                  print(f"{path}: {reason}")
              sys.exit(1)

          print("Notebook JSON validation passed.")
          PY

  push_to_mirror:
    name: Push to Mirror
    runs-on: ubuntu-latest
    needs: lint_and_sanity
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: tardis_production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare SSH and mirror configuration
        shell: bash
        env:
          PRIVATE_SSH_KEY: ${{ secrets.PRIVATE_SSH_KEY }}
          MIRROR_SSH_URL: git@github.com:EpitechPGE1-2025/G-AIA-210-NCE-2-1-tardis-1.git
        run: |
          set -euo pipefail

          if [[ -z "${MIRROR_SSH_URL:-}" ]]; then
            echo "::error::MIRROR_SSH_URL is empty."
            exit 1
          fi

          if [[ -z "${PRIVATE_SSH_KEY:-}" ]]; then
            echo "::error::PRIVATE_SSH_KEY secret is missing."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Try common secret encodings and keep the first key accepted by ssh-keygen.
          python - <<'PY'
          import base64
          import os
          import pathlib

          raw = os.environ["PRIVATE_SSH_KEY"].strip().strip('"').strip("'")
          candidates = []

          candidates.append(raw.replace("\\r", "").replace("\\n", "\n"))
          candidates.append(raw.replace("\r", ""))

          try:
              decoded = base64.b64decode(raw, validate=True).decode("utf-8")
          except Exception:
              decoded = None

          if decoded:
              candidates.append(decoded.replace("\\r", "").replace("\\n", "\n"))
              candidates.append(decoded.replace("\r", ""))

          ssh_dir = pathlib.Path.home() / ".ssh"
          for index, content in enumerate(candidates, start=1):
              candidate_path = ssh_dir / f"id_mirror_candidate_{index}"
              if not content.endswith("\n"):
                  content += "\n"
              candidate_path.write_text(content, encoding="utf-8")
              candidate_path.chmod(0o600)
          PY

          valid_key=""
          for candidate in ~/.ssh/id_mirror_candidate_*; do
            if ssh-keygen -y -f "$candidate" >/dev/null 2>&1; then
              valid_key="$candidate"
              break
            fi
          done

          if [[ -z "$valid_key" ]]; then
            echo "::error::No valid SSH private key could be built from PRIVATE_SSH_KEY."
            exit 1
          fi

          cp "$valid_key" ~/.ssh/id_mirror
          chmod 600 ~/.ssh/id_mirror
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Mirror all refs
        shell: bash
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/id_mirror -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes
        run: |
          set -euo pipefail

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git checkout --detach

          # Ensure all branch and tag refs are present locally before mirroring.
          git fetch --prune origin '+refs/heads/*:refs/heads/*'
          git fetch --prune origin '+refs/tags/*:refs/tags/*'

          git remote add mirror git@github.com:EpitechPGE1-2025/G-AIA-210-NCE-2-1-tardis-1.git
          git push --mirror mirror
